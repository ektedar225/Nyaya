<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | FHM-Legal-Solution</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin-styles.css">
</head>
<body>
<div class="login-wrap">
  <form class="login-card" id="login-form">
    <h1>Admin Login</h1>
    <div class="sub">FHM-Legal-Solution management dashboard</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" required autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-gold btn-block" id="login-btn">Log In</button>
  </form>
  <div style="text-align:center; margin-top:20px; font-size:0.8rem; color:rgba(255,255,255,0.4);">Developed by Ektedar Ahmad</div>
</div>

<script src="js/admin-api.js"></script>
<script src="js/admin-auth.js"></script>
</body>
</html>
