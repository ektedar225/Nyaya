<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | FHM-Legal-Solution</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin-styles.css">
</head>
<body>
<div class="app">
  <div class="sidebar">

      <div class="name">FHM-Legal-Solution</div>
      <div class="role">Admin Dashboard</div>
    </div>
    <div class="nav-item" data-view="advocates">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Advocates
    </div>
    <div class="nav-item" data-view="homepage">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Homepage Content

    </div>
    <div class="nav-item" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-block" style="color:#fff;border-color:rgba(255,255,255,.2);" onclick="logout()">Log Out</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="view-title">Advocates</h2>
      <div id="admin-name" style="font-size:0.82rem;color:var(--text-muted);"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="js/admin-api.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/admin-app.js"></script>
</body>
</html>
